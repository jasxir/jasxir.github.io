# schemas/supervisor.yaml

Supervisor:
  type: object
  description: A single record representing a supervisor.
  required:
    - id
    - name
  properties:
    id:
      type: string
      description: The unique supervisor ID (mapped from `htam_supervisor_id`).
      example: "01403226"
    name:
      type: string
      description: The full name of the supervisor (mapped from `htam_supervisor_name`).
      example: "MOHD ASRI BIN MOHD RAZALI"
