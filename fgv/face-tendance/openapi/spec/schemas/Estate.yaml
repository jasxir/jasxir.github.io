# schemas/Estate.yaml

Estate:
  type: object
  properties:
    id:
      type: string
      description: The unique estate ID (mapped from `cotw_code`).
      example: "0320"
    name:
      type: string
      description: Name of the estate (mapped from `cotw_name`).
      example: "ARING 2"
    state:
      type: string
      description: Id of the state (mapped from `cotw_state`).
      example: "KELANTAN"
    workEnd:
      type: string
      format: time
      description: The end time of the main work shift (mapped from `cotw_work_end`).
      example: "16:30"
    rest1Start:
      type: string
      format: time
      description: The start time of the first rest period (mapped from `cotw_rest1_start`).
      example: "10:15"
    rest1End:
      type: string
      format: time
      description: The end time of the first rest period (mapped from `cotw_rest1_end`).
      example: "11:00"
    rest2Start:
      type: string
      format: time
      description: The start time of the second rest period (mapped from `cotw_rest2_start`).
      example: "12:45"
    rest2End:
      type: string
      format: time
      description: The end time of the second rest period (mapped from `cotw_rest2_end`).
      example: "14:00"
    overtimeThreshold:
      type: string
      format: duration
      description: |
        Mapped from `cotw_rest_ot`.\
        **OT** = (*ClockOutTime* - `cotw_work_end`) - `cotw_rest_ot`\
        e.g.\
        **OT** = (*07:00PM* -  `04:30PM`) - `00:30` = **02:00**\
        _**NOTE:** Value can't be set negative, set **00:00** if calculation gives -ve._
      example: "00:30"
